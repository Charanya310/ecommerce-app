name: CI/CD Build, Push & Deploy for ecommerce-app

on:
  push:
    paths:
      - 'backend/**'
    branches: [ "feature" ]

env:
  REGISTRY: gcr.io
  PROJECT: devops-docker-491007
  APP: ecommerce-backend

jobs:

  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_DEVOPS_CREDENTIALS }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker --quiet

      - name: Build Image
        run: |
          docker build backend \
          -f backend/Dockerfile \
          -t $REGISTRY/$PROJECT/$APP:$GITHUB_RUN_NUMBER

      - name: Push Image
        run: |
          docker push $REGISTRY/$PROJECT/$APP:$GITHUB_RUN_NUMBER


  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy to VM
        env:
          VM_HOST: ${{ secrets.VM_SSH_HOST }}
          VM_USER: ${{ secrets.VM_SSH_USER }}
          VM_PORT: ${{ secrets.VM_SSH_PORT }}
        run: |
          ssh -o StrictHostKeyChecking=no -p $VM_PORT $VM_USER@$VM_HOST << EOF
          sudo gcloud auth configure-docker --quiet
          sudo docker pull gcr.io/devops-docker-491007/ecommerce-backend:$GITHUB_RUN_NUMBER
          sudo docker stop backend || true
          sudo docker rm backend || true
          sudo docker run -d -p 3000:3000 --name backend gcr.io/devops-docker-491007/ecommerce-backend:$GITHUB_RUN_NUMBER
          EOF